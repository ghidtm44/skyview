<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="description" content="Real-time radar of every plane and satellite above any address. No login, no app." />
<title>SKYVIEW :: SECTOR TRACKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #000a08;
  --bg-deep: #020403;
  --green: #2afd6e;
  --green-dim: #168f3f;
  --green-glow: rgba(42, 253, 110, 0.55);
  --green-faint: rgba(42, 253, 110, 0.18);
  --amber: #ffb000;
  --amber-glow: rgba(255, 176, 0, 0.6);
  --cyan: #5ee7ff;
  --red: #ff3b3b;
  --text: #b8ffd0;
  --text-dim: #5fb37e;
  --grid: #0c2a1c;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: #050505;
  color: var(--text);
  font-family: 'Share Tech Mono', ui-monospace, monospace;
  -webkit-font-smoothing: antialiased;
}
html { min-height: 100%; }
body {
  min-height: 100vh;
  min-height: 100dvh;
  background: radial-gradient(ellipse at center, #0a1410 0%, #020403 80%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* ------ BEZEL / CRT ------ */
.bezel {
  width: 100%;
  max-width: 1480px;
  height: calc(100vh - 32px);
  height: calc(100dvh - 32px);
  max-height: 960px;
  min-height: 480px;
  border-radius: 24px;
  padding: 18px;
  background: linear-gradient(150deg, #1c1c1c 0%, #080808 100%);
  box-shadow:
    inset 0 0 0 2px #2c2c2c,
    inset 0 6px 24px rgba(255,255,255,0.05),
    0 30px 80px rgba(0,0,0,0.7);
  position: relative;
  flex-shrink: 0;
}
.bezel::after {
  content: 'GHIDTM44 INDUSTRIES  ───  MODEL SV-2026';
  position: absolute;
  bottom: 4px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  color: #555;
  font-size: 10px;
  letter-spacing: 4px;
}
.screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 0 80px rgba(42, 253, 110, 0.08),
    inset 0 0 0 1px var(--grid);
  display: grid;
  grid-template-rows: auto 1fr auto;
}
/* CRT scanlines */
.screen::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0, 60, 30, 0.18) 3px,
    rgba(0, 60, 30, 0.18) 4px
  );
  pointer-events: none;
  z-index: 50;
}
/* Vignette + top sheen */
.screen::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%),
    radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04), transparent 40%);
  pointer-events: none;
  z-index: 60;
}

/* ------ HEADER ------ */
header {
  padding: 14px 22px 10px;
  border-bottom: 1px solid #103a26;
  display: flex;
  justify-content: space-between;
  gap: 22px;
  align-items: baseline;
  position: relative;
  z-index: 10;
  flex-wrap: wrap;
}
.title {
  color: var(--green);
  font-family: 'VT323', monospace;
  font-size: 30px;
  letter-spacing: 3px;
  text-shadow: 0 0 8px var(--green-glow), 0 0 22px var(--green-glow);
}
.title small {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 4px;
  margin-left: 12px;
  text-shadow: none;
}
.meta {
  color: var(--text-dim);
  display: flex;
  gap: 22px;
  font-size: 13px;
  flex-wrap: wrap;
}
.meta b {
  color: var(--green);
  font-weight: normal;
  text-shadow: 0 0 6px var(--green-glow);
  margin-left: 6px;
}
.led {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green), 0 0 12px var(--green);
  animation: blink 1.4s infinite;
  margin-right: 6px;
  vertical-align: middle;
}
.led.bad { background: var(--red); box-shadow: 0 0 6px var(--red), 0 0 12px var(--red); }
.led.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber), 0 0 12px var(--amber); }
@keyframes blink { 50% { opacity: 0.35; } }

/* ------ MAIN GRID ------ */
main {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 14px;
  padding: 14px 18px;
  min-height: 0;
  position: relative;
  z-index: 5;
}
@media (max-width: 980px) {
  main { grid-template-columns: 1fr; grid-template-rows: 1fr 220px; }
}

.radar-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 0;
  min-width: 0;
  background: radial-gradient(circle at center, #021410 0%, #00080a 80%);
  border: 1px solid var(--grid);
  border-radius: 8px;
  overflow: hidden;
}
canvas#radar {
  display: block;
  filter: drop-shadow(0 0 6px rgba(42, 253, 110, 0.35));
}
#hover-info {
  position: absolute;
  pointer-events: none;
  background: rgba(0, 20, 12, 0.94);
  border: 1px solid var(--green-dim);
  padding: 6px 10px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
  display: none;
  z-index: 30;
  box-shadow: 0 0 12px var(--green-glow);
  white-space: nowrap;
  min-width: 160px;
}
#hover-info b {
  color: var(--amber);
  text-shadow: 0 0 4px var(--amber-glow);
  display: block;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
#hover-info.sat b { color: var(--green); text-shadow: 0 0 4px var(--green-glow); }
#hover-info .row {
  display: flex; justify-content: space-between; gap: 16px;
  color: var(--text-dim);
}
#hover-info .row span:last-child { color: var(--text); }
.empty-msg {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-family: 'VT323', monospace;
  color: var(--text-dim);
  font-size: 18px;
  letter-spacing: 2px;
  text-align: center;
  padding: 20px;
  z-index: 5;
  pointer-events: none;
}

/* ------ TARGET LIST ------ */
aside.list {
  display: grid;
  grid-template-rows: auto 1fr;
  background: #021410;
  border: 1px solid var(--grid);
  border-radius: 8px;
  overflow: hidden;
  min-height: 0;
}
.list-head {
  padding: 8px 12px;
  border-bottom: 1px dashed var(--grid);
  font-size: 11px;
  color: var(--text-dim);
  display: grid;
  grid-template-columns: 22px 1fr 44px 36px 56px;
  gap: 8px;
  letter-spacing: 1px;
}
.list-body {
  overflow-y: auto;
  font-size: 13px;
  scrollbar-width: thin;
  scrollbar-color: var(--green-dim) transparent;
}
.list-body::-webkit-scrollbar { width: 8px; }
.list-body::-webkit-scrollbar-thumb {
  background: var(--green-dim);
  border-radius: 4px;
}
.tgt-row {
  padding: 6px 12px;
  display: grid;
  grid-template-columns: 22px 1fr 44px 36px 56px;
  gap: 8px;
  align-items: baseline;
  border-bottom: 1px solid rgba(12, 42, 28, 0.5);
  cursor: pointer;
  transition: background 100ms;
}
.tgt-row:hover { background: rgba(42, 253, 110, 0.08); }
.tgt-row.selected {
  background: rgba(94, 231, 255, 0.1);
  outline: 1px solid var(--cyan);
  outline-offset: -2px;
}
.tgt-row .glyph { text-align: center; font-size: 14px; }
.tgt-row.plane .glyph { color: var(--amber); text-shadow: 0 0 4px var(--amber-glow); }
.tgt-row.sat .glyph { color: var(--green); text-shadow: 0 0 4px var(--green-glow); }
.tgt-row .id { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.tgt-row .id b {
  color: var(--green);
  text-shadow: 0 0 4px var(--green-glow);
  font-weight: normal;
  letter-spacing: 1px;
}
.tgt-row.plane .id b { color: var(--amber); text-shadow: 0 0 4px var(--amber-glow); }
.tgt-row .sub {
  color: var(--text-dim);
  font-size: 10.5px;
  letter-spacing: 0.5px;
}
.tgt-row .num {
  color: var(--text);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.list-empty {
  padding: 22px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 1px;
}

/* ------ FOOTER / FORM ------ */
footer {
  border-top: 1px solid #103a26;
  padding: 10px 22px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  font-size: 13px;
  position: relative;
  z-index: 10;
  flex-wrap: wrap;
}
.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 280px;
}
.prompt {
  color: var(--green);
  text-shadow: 0 0 4px var(--green-glow);
  letter-spacing: 1px;
  white-space: nowrap;
}
input[type=text] {
  flex: 1;
  min-width: 0;
  background: rgba(0, 20, 12, 0.6);
  border: 1px solid var(--green-dim);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 6px 10px;
  outline: none;
  caret-color: var(--green);
  letter-spacing: 1px;
}
input[type=text]:focus {
  border-color: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
}
input[type=text]::placeholder { color: rgba(95, 179, 126, 0.5); }
button {
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 120ms;
  text-shadow: 0 0 4px var(--green-glow);
  white-space: nowrap;
}
button:hover:not(:disabled) {
  background: rgba(42, 253, 110, 0.12);
  box-shadow: 0 0 12px var(--green-glow);
}
button:disabled { opacity: 0.4; cursor: wait; }
button.ghost {
  border-color: var(--text-dim);
  color: var(--text-dim);
  text-shadow: none;
}
button.ghost:hover { background: rgba(95, 179, 126, 0.1); box-shadow: 0 0 8px rgba(95, 179, 126, 0.4); }

.status {
  color: var(--text-dim);
  font-size: 12px;
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
}
.status b { color: var(--green); font-weight: normal; text-shadow: 0 0 4px var(--green-glow); }
.legend { display: flex; gap: 12px; }
.legend .p { color: var(--amber); }
.legend .s { color: var(--green); }

/* ------ ERROR STRIP ------ */
.errstrip {
  position: absolute;
  left: 8px; right: 8px; bottom: 56px;
  background: rgba(40, 0, 0, 0.94);
  border: 1px solid var(--red);
  color: #ff8888;
  padding: 6px 10px;
  font-size: 11px;
  z-index: 95;
  display: none;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 30vh;
  overflow: auto;
}
.errstrip.show { display: block; }

/* ------ TOAST ------ */
.toast {
  position: absolute;
  top: 24px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 20, 12, 0.94);
  border: 1px solid var(--amber);
  padding: 12px 22px;
  font-size: 13px;
  color: var(--amber);
  text-shadow: 0 0 6px var(--amber-glow);
  z-index: 80;
  box-shadow: 0 0 24px var(--amber-glow);
  letter-spacing: 1px;
  display: none;
  white-space: nowrap;
}
.toast.show { display: block; animation: toastIn 200ms ease; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -8px); } }

/* ------ BOOT OVERLAY ------ */
.boot {
  position: absolute; inset: 0;
  background: var(--bg);
  z-index: 70;
  display: grid;
  place-items: center;
  font-family: 'VT323', monospace;
  color: var(--green);
  text-shadow: 0 0 6px var(--green-glow);
  letter-spacing: 1px;
  transition: opacity 400ms ease;
}
.boot.hidden { opacity: 0; pointer-events: none; }
.boot pre {
  margin: 0;
  font-family: inherit;
  font-size: 18px;
  line-height: 1.5;
  text-align: left;
}
.boot .cursor::after {
  content: '▌';
  animation: blink 1s steps(1) infinite;
  margin-left: 4px;
}

/* ------ CREDITS ------ */
.credits {
  font-size: 10px;
  color: #2c5e3f;
  letter-spacing: 2px;
}
.credits a { color: inherit; text-decoration: none; }
.credits a:hover { color: var(--green-dim); }

/* ------ MOBILE ------ */
@media (max-width: 720px) {
  body { padding: 6px; }
  .bezel { padding: 8px; border-radius: 12px; }
  .bezel::after { display: none; }
  header { padding: 10px 14px; flex-direction: column; gap: 6px; align-items: flex-start; font-size: 12px; }
  .title { font-size: 24px; }
  .title small { display: block; margin-left: 0; margin-top: 2px; }
  main { padding: 8px; gap: 10px; grid-template-rows: 1fr 200px; }
  footer { padding: 8px 12px; font-size: 12px; gap: 10px; }
  .credits { display: none; }
  .input-row { min-width: 100%; }
  .status { font-size: 11px; gap: 10px; }
}
</style>
</head>
<body>
<div class="bezel">
  <div class="screen">
    <header>
      <div class="title">SKYVIEW <small>SECTOR TRACKING SYSTEM</small></div>
      <div class="meta">
        <span><span class="led" id="led"></span><b id="status-text">STANDBY</b></span>
        <span>OBS<b id="obs-coord">— — —</b></span>
        <span>UTC<b id="utc-clock">--:--:--</b></span>
      </div>
    </header>

    <main>
      <div class="radar-wrap">
        <canvas id="radar"></canvas>
        <div id="hover-info"></div>
        <div class="empty-msg" id="empty-msg" style="display:none;">
          ◯ ENTER OBSERVER COORDINATES BELOW ◯<br />
          <span style="font-size:13px; opacity:0.7;">awaiting target lock</span>
        </div>
      </div>

      <aside class="list">
        <div class="list-head">
          <div></div><div>ID</div><div>AZ</div><div>EL</div><div>RNG</div>
        </div>
        <div class="list-body" id="target-body">
          <div class="list-empty">// no targets //</div>
        </div>
      </aside>
    </main>

    <footer>
      <div class="input-row" id="obs-form">
        <span class="prompt">&gt; SET OBSERVER:</span>
        <input id="addr" type="text" placeholder='ADDRESS, CITY  ─OR─  LAT, LON  (e.g. "Times Square" or "40.71, -74.00")' spellcheck="false" />
        <button type="button" id="scan-btn">[ SCAN ]</button>
        <button type="button" class="ghost" id="geo-btn" title="Use device location">GEO</button>
        <button type="button" class="ghost" id="share-btn" title="Copy shareable link" disabled>SHARE</button>
      </div>
      <div class="status">
        <span>TGT<b id="tgt-count">0</b></span>
        <span>ORBITALS<b id="sat-count">0</b></span>
        <span>NEXT<b id="next-refresh">—</b>s</span>
        <span class="legend">
          <span class="p">▲ AIRCRAFT</span>
          <span class="s">● ORBITAL</span>
        </span>
        <span class="credits">DATA: airplanes.live · celestrak · openstreetmap</span>
      </div>
    </footer>

    <div class="toast" id="toast"></div>
    <div class="errstrip" id="errstrip"></div>

    <div class="boot" id="boot">
      <pre id="boot-lines">SKYVIEW SECTOR TRACKING SYSTEM v1.0</pre>
    </div>
  </div>
</div>

<script type="module">
import * as satellite from 'https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/+esm';

// ===== CONSTANTS =====
const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;
const PLANE_REFRESH_MS = 12_000;
const TLE_REFRESH_MS = 6 * 3600 * 1000;
const PLANE_RADIUS_NM = 250;

// ===== STATE =====
const state = {
  observer: null,
  planes: [],
  satellites: [],
  satCatalog: [],
  trails: new Map(),
  selectedId: null,
  hoverId: null,
  lastPlaneFetch: 0,
  lastTleFetch: 0,
  loadingPlanes: false,
};

// ===== DOM =====
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const targetBody = document.getElementById('target-body');
const utcClock = document.getElementById('utc-clock');
const obsCoord = document.getElementById('obs-coord');
const statusText = document.getElementById('status-text');
const led = document.getElementById('led');
const tgtCount = document.getElementById('tgt-count');
const satCount = document.getElementById('sat-count');
const nextRefresh = document.getElementById('next-refresh');
const hoverInfo = document.getElementById('hover-info');
const addrInput = document.getElementById('addr');
const scanBtn = document.getElementById('scan-btn');
const geoBtn = document.getElementById('geo-btn');
const shareBtn = document.getElementById('share-btn');
const toast = document.getElementById('toast');
const boot = document.getElementById('boot');
const bootLines = document.getElementById('boot-lines');
const emptyMsg = document.getElementById('empty-msg');

const params = new URLSearchParams(location.search);
if (params.has('clear')) { try { localStorage.clear(); } catch(_){} }

const errstrip = document.getElementById('errstrip');
function showErr(label, e) {
  const msg = (e && (e.stack || e.message)) || String(e);
  console.error(label, e);
  errstrip.textContent = `ERR ${label}: ${msg}`;
  errstrip.classList.add('show');
}
window.addEventListener('error', (ev) => showErr('window', ev.error || ev.message));
window.addEventListener('unhandledrejection', (ev) => showErr('promise', ev.reason));

// ===== UTIL =====
function setStatus(text, level = 'ok') {
  statusText.textContent = text.toUpperCase();
  led.classList.remove('bad', 'warn');
  if (level === 'bad') led.classList.add('bad');
  else if (level === 'warn') led.classList.add('warn');
}
let toastTimer;
function showToast(msg, ms = 2400) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatRange(km) {
  if (km == null) return '—';
  if (km < 1000) return `${Math.round(km)}km`;
  return `${(km/1000).toFixed(1)}Mm`;
}

// ===== ECEF / LOOK ANGLE (proper, accounts for earth curvature) =====
function geodeticToEcef(latDeg, lonDeg, hKm) {
  const a = 6378.137; // WGS84 semi-major (km)
  const f = 1 / 298.257223563;
  const e2 = 2*f - f*f;
  const sφ = Math.sin(latDeg*D2R), cφ = Math.cos(latDeg*D2R);
  const sλ = Math.sin(lonDeg*D2R), cλ = Math.cos(lonDeg*D2R);
  const N = a / Math.sqrt(1 - e2*sφ*sφ);
  return [
    (N + hKm) * cφ * cλ,
    (N + hKm) * cφ * sλ,
    (N*(1 - e2) + hKm) * sφ,
  ];
}
function lookAngles(obsLat, obsLon, obsHkm, tgtLat, tgtLon, tgtHkm) {
  const [x1,y1,z1] = geodeticToEcef(obsLat, obsLon, obsHkm);
  const [x2,y2,z2] = geodeticToEcef(tgtLat, tgtLon, tgtHkm);
  const dx = x2-x1, dy = y2-y1, dz = z2-z1;
  const sφ = Math.sin(obsLat*D2R), cφ = Math.cos(obsLat*D2R);
  const sλ = Math.sin(obsLon*D2R), cλ = Math.cos(obsLon*D2R);
  const east  = -sλ*dx + cλ*dy;
  const north = -sφ*cλ*dx - sφ*sλ*dy + cφ*dz;
  const up    =  cφ*cλ*dx + cφ*sλ*dy + sφ*dz;
  const range = Math.hypot(dx, dy, dz);
  const el = Math.asin(up / range) * R2D;
  let az = Math.atan2(east, north) * R2D;
  if (az < 0) az += 360;
  return { az, el, range };
}

// ===== GEOCODE =====
async function geocode(query) {
  const trimmed = query.trim();
  // lat,lon shortcut
  const m = trimmed.match(/^(-?\d{1,2}(?:\.\d+)?)\s*[,\s]\s*(-?\d{1,3}(?:\.\d+)?)$/);
  if (m) {
    const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
    if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
      return { lat, lon, name: `${lat.toFixed(3)}, ${lon.toFixed(3)}` };
    }
  }
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(trimmed)}&format=json&limit=1`;
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error(`GEOCODE HTTP ${res.status}`);
  const data = await res.json();
  if (!data.length) throw new Error('NO MATCH FOR ADDRESS');
  return {
    lat: parseFloat(data[0].lat),
    lon: parseFloat(data[0].lon),
    name: data[0].display_name,
  };
}

// ===== AIRCRAFT FETCH =====
async function fetchPlanes() {
  if (!state.observer) return;
  if (state.loadingPlanes) return;
  state.loadingPlanes = true;
  const { lat, lon } = state.observer;
  try {
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${PLANE_RADIUS_NM}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`AIRSPACE ${res.status}`);
    const data = await res.json();
    const ac = data.ac || data.aircraft || [];
    const out = [];
    for (const a of ac) {
      if (a.lat == null || a.lon == null) continue;
      const altFt = (typeof a.alt_baro === 'number') ? a.alt_baro
                  : (typeof a.alt_geom === 'number') ? a.alt_geom : null;
      if (altFt == null || altFt < 0) continue;
      const altKm = altFt / 3280.84;
      const la = lookAngles(lat, lon, 0.05, a.lat, a.lon, altKm);
      if (la.el < -1) continue; // small tolerance
      const cs = (a.flight || a.r || a.hex || '').trim();
      out.push({
        id: 'p:' + a.hex,
        kind: 'plane',
        cs: cs || a.hex,
        reg: a.r || '',
        type: a.t || '',
        desc: a.desc || '',
        az: la.az,
        el: la.el,
        alt_ft: altFt,
        gs: a.gs || 0,
        track: (a.track ?? a.true_heading ?? a.mag_heading ?? null),
        rangeKm: la.range,
        baro_rate: a.baro_rate || 0,
        lat: a.lat, lon: a.lon,
      });
    }
    state.planes = out;
    state.lastPlaneFetch = Date.now();
    if (state.satCatalog.length) setStatus('TRACKING');
  } catch (e) {
    console.error(e);
    setStatus('AIRSPACE ERR', 'warn');
    showToast('AIRCRAFT FEED OFFLINE — RETRY ' + Math.round(PLANE_REFRESH_MS/1000) + 's');
  } finally {
    state.loadingPlanes = false;
  }
}

// ===== TLE FETCH =====
async function fetchTLEs() {
  const groups = ['stations', 'visual', 'gps-ops'];
  try {
    const fetchOne = (g) => {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      return fetch(`https://celestrak.org/NORAD/elements/gp.php?GROUP=${g}&FORMAT=tle`, { signal: ctrl.signal })
        .then(r => { clearTimeout(t); if (!r.ok) throw new Error('TLE HTTP ' + r.status); return r.text(); })
        .catch(e => { clearTimeout(t); console.warn('TLE group failed:', g, e.message); return ''; });
    };
    const fetched = await Promise.all(groups.map(fetchOne));
    const seen = new Set();
    const sats = [];
    for (const text of fetched) {
      const lines = text.replace(/\r/g, '').split('\n').map(l => l.trim()).filter(Boolean);
      for (let i = 0; i + 2 < lines.length; i += 3) {
        if (!lines[i+1].startsWith('1 ') || !lines[i+2].startsWith('2 ')) continue;
        const name = lines[i].replace(/\s+$/, '');
        if (seen.has(name)) continue;
        try {
          const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
          if (satrec.error) continue;
          sats.push({ name, satrec });
          seen.add(name);
        } catch {}
      }
    }
    state.satCatalog = sats;
    state.lastTleFetch = Date.now();
    return sats.length;
  } catch (e) {
    console.error(e);
    showToast('ORBITAL CATALOG OFFLINE');
    return 0;
  }
}

// ===== SAT POSITIONS =====
function computeSatellites() {
  if (!state.observer || !state.satCatalog.length) {
    state.satellites = [];
    return;
  }
  const now = new Date();
  const gmst = satellite.gstime(now);
  const observerGd = {
    longitude: state.observer.lon * D2R,
    latitude: state.observer.lat * D2R,
    height: 0.05,
  };
  const out = [];
  for (const s of state.satCatalog) {
    let pv;
    try { pv = satellite.propagate(s.satrec, now); }
    catch { continue; }
    if (!pv || !pv.position || pv.position === false) continue;
    const ecf = satellite.eciToEcf(pv.position, gmst);
    const look = satellite.ecfToLookAngles(observerGd, ecf);
    const el = look.elevation * R2D;
    if (el < 0) continue;
    const az = ((look.azimuth * R2D) + 360) % 360;
    const geo = satellite.eciToGeodetic(pv.position, gmst);
    const v = pv.velocity;
    const vel = v ? Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z) : 0;
    out.push({
      id: 's:' + s.name,
      kind: 'sat',
      cs: s.name,
      az, el,
      alt_km: geo.height,
      vel_kms: vel,
      rangeKm: look.rangeSat,
    });
  }
  out.sort((a, b) => b.el - a.el);
  state.satellites = out;
}

// ===== RADAR DRAW =====
let canvasSize = 0;
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const size = Math.max(200, Math.min(rect.width, rect.height) - 8);
  canvasSize = size;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(size * dpr);
  canvas.height = Math.floor(size * dpr);
  canvas.style.width = canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
try {
  new ResizeObserver(() => resizeCanvas()).observe(canvas.parentElement);
} catch {}

function polarToXY(az, el, cx, cy, R) {
  const r = (1 - Math.max(0, Math.min(90, el)) / 90) * R;
  const θ = az * D2R;
  return [cx + r * Math.sin(θ), cy - r * Math.cos(θ)];
}

function drawRadar(t) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w || !h) return;
  const cx = w / 2, cy = h / 2;
  const R = Math.min(cx, cy) - 22;

  // BG
  ctx.fillStyle = '#020a08';
  ctx.fillRect(0, 0, w, h);

  // soft phosphor glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0, 'rgba(42, 253, 110, 0.10)');
  grad.addColorStop(0.6, 'rgba(42, 253, 110, 0.03)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();

  // Rings
  ctx.lineWidth = 1;
  for (const el of [0, 30, 60]) {
    const r = (1 - el / 90) * R;
    ctx.strokeStyle = el === 0 ? 'rgba(42, 253, 110, 0.55)' : 'rgba(42, 253, 110, 0.22)';
    ctx.setLineDash(el === 0 ? [] : [4, 6]);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Spokes
  ctx.strokeStyle = 'rgba(42, 253, 110, 0.18)';
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.sin(a), cy - R * Math.cos(a));
    ctx.stroke();
  }

  // Sweep arm
  const sweepPeriod = 6500;
  const sweepAngle = (t % sweepPeriod) / sweepPeriod * Math.PI * 2;
  ctx.save();
  ctx.translate(cx, cy);
  const slices = 28;
  for (let i = 0; i < slices; i++) {
    const a1 = sweepAngle - (i / slices) * (Math.PI / 2);
    const a2 = sweepAngle - ((i + 1) / slices) * (Math.PI / 2);
    const alpha = (1 - i / slices) * 0.16;
    ctx.fillStyle = `rgba(42, 253, 110, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, -Math.PI/2 + a1, -Math.PI/2 + a2, true);
    ctx.fill();
  }
  ctx.strokeStyle = 'rgba(42, 253, 110, 0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(R * Math.sin(sweepAngle), -R * Math.cos(sweepAngle));
  ctx.stroke();
  ctx.restore();

  // Compass labels
  ctx.font = "16px 'VT323', monospace";
  ctx.fillStyle = 'rgba(42, 253, 110, 0.95)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const [L, az] of [['N',0],['E',90],['S',180],['W',270]]) {
    const r = R + 12;
    const x = cx + r * Math.sin(az * D2R);
    const y = cy - r * Math.cos(az * D2R);
    ctx.fillText(L, x, y);
  }
  ctx.fillStyle = 'rgba(42, 253, 110, 0.45)';
  ctx.font = "10px 'Share Tech Mono', monospace";
  ctx.textAlign = 'left';
  for (const el of [30, 60]) {
    const r = (1 - el / 90) * R;
    ctx.fillText(`${el}°`, cx + r + 4, cy - 4);
  }

  // Build target list with positions
  const allTargets = [...state.satellites, ...state.planes];
  for (const tgt of allTargets) {
    const [x, y] = polarToXY(tgt.az, tgt.el, cx, cy, R);
    tgt._x = x; tgt._y = y;
    let trail = state.trails.get(tgt.id);
    if (!trail) { trail = []; state.trails.set(tgt.id, trail); }
    if (!trail.length || trail[trail.length-1][2] < t - 700) {
      trail.push([x, y, t]);
      if (trail.length > 18) trail.shift();
    }
  }
  // GC trails
  if (state.trails.size > 600) {
    const live = new Set(allTargets.map(x => x.id));
    for (const k of [...state.trails.keys()]) if (!live.has(k)) state.trails.delete(k);
  }

  // Draw trails
  for (const tgt of allTargets) {
    const trail = state.trails.get(tgt.id);
    if (!trail || trail.length < 2) continue;
    const color = tgt.kind === 'plane' ? [255, 176, 0] : [42, 253, 110];
    for (let i = 1; i < trail.length; i++) {
      const a = (i / trail.length) * 0.55;
      ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},${a})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(trail[i-1][0], trail[i-1][1]);
      ctx.lineTo(trail[i][0], trail[i][1]);
      ctx.stroke();
    }
  }

  // Sat dots (with pulse)
  for (const s of state.satellites) {
    const x = s._x, y = s._y;
    const pulse = 0.5 + 0.5 * Math.sin(t/450 + (x*0.13 + y*0.17));
    ctx.fillStyle = `rgba(42, 253, 110, ${0.55 + pulse * 0.45})`;
    ctx.beginPath(); ctx.arc(x, y, 3.4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(42, 253, 110, ${0.35 * pulse})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, 6 + pulse * 2, 0, Math.PI*2); ctx.stroke();
    if (s.id === state.selectedId || s.id === state.hoverId) {
      ctx.strokeStyle = 'rgba(94, 231, 255, 0.95)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y, 11, 0, Math.PI*2); ctx.stroke();
    }
  }

  // Plane chevrons
  for (const p of state.planes) {
    const x = p._x, y = p._y;
    const heading = (p.track != null) ? p.track : 0;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(heading * D2R);
    ctx.fillStyle = 'rgba(255, 176, 0, 0.95)';
    ctx.shadowColor = 'rgba(255, 176, 0, 0.7)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.lineTo(5, 5);
    ctx.lineTo(0, 2);
    ctx.lineTo(-5, 5);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    if (p.id === state.selectedId || p.id === state.hoverId) {
      ctx.strokeStyle = 'rgba(94, 231, 255, 0.95)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y, 11, 0, Math.PI*2); ctx.stroke();
    }
  }

  // Center observer cross
  ctx.strokeStyle = 'rgba(42, 253, 110, 0.95)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx-5, cy); ctx.lineTo(cx+5, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-5); ctx.lineTo(cx, cy+5); ctx.stroke();
  ctx.fillStyle = 'rgba(42, 253, 110, 0.95)';
  ctx.beginPath(); ctx.arc(cx, cy, 1.4, 0, Math.PI*2); ctx.fill();
}

// ===== TARGET LIST =====
function renderList() {
  const all = [
    ...state.planes.map(p => ({ ref: p, key: -p.el })),
    ...state.satellites.map(s => ({ ref: s, key: -s.el })),
  ].sort((a, b) => a.key - b.key);

  tgtCount.textContent = state.planes.length + state.satellites.length;
  satCount.textContent = state.satellites.length;

  if (all.length === 0) {
    targetBody.innerHTML = '<div class="list-empty">// no targets above horizon //</div>';
    return;
  }

  const LIST_CAP = 80;
  const truncated = all.length > LIST_CAP;
  const visible = truncated ? all.slice(0, LIST_CAP) : all;

  const frag = document.createDocumentFragment();
  for (const { ref: t } of visible) {
    const row = document.createElement('div');
    row.className = `tgt-row ${t.kind}` + (t.id === state.selectedId ? ' selected' : '');
    row.dataset.id = t.id;
    const glyph = t.kind === 'plane' ? '▲' : '●';
    const id = (t.cs || '—').slice(0, 14);
    let sub = '';
    if (t.kind === 'plane') {
      const altPart = t.alt_ft ? `${Math.round(t.alt_ft/1000)}k` : '';
      const spdPart = t.gs ? `${Math.round(t.gs)}kt` : '';
      sub = [altPart, spdPart].filter(Boolean).join(' · ');
    } else {
      sub = `${Math.round(t.alt_km)}km · ${t.vel_kms.toFixed(1)}km/s`;
    }
    row.innerHTML =
      `<div class="glyph">${glyph}</div>` +
      `<div class="id"><b>${escapeHtml(id)}</b><br><span class="sub">${escapeHtml(sub)}</span></div>` +
      `<div class="num">${Math.round(t.az).toString().padStart(3, '0')}°</div>` +
      `<div class="num">${Math.round(t.el).toString().padStart(2, '0')}°</div>` +
      `<div class="num">${formatRange(t.rangeKm)}</div>`;
    row.addEventListener('click', () => {
      state.selectedId = state.selectedId === t.id ? null : t.id;
      renderList();
    });
    row.addEventListener('mouseenter', () => { state.hoverId = t.id; });
    row.addEventListener('mouseleave', () => { state.hoverId = null; });
    frag.appendChild(row);
  }
  if (truncated) {
    const more = document.createElement('div');
    more.className = 'list-empty';
    more.textContent = `+ ${all.length - LIST_CAP} more below — sorted by elevation`;
    frag.appendChild(more);
  }
  targetBody.replaceChildren(frag);
}

// ===== HOVER ON CANVAS =====
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let nearest = null;
  let bestDist = 18;
  for (const t of [...state.planes, ...state.satellites]) {
    if (t._x == null) continue;
    const d = Math.hypot(t._x - mx, t._y - my);
    if (d < bestDist) { bestDist = d; nearest = t; }
  }
  if (nearest) {
    state.hoverId = nearest.id;
    canvas.style.cursor = 'crosshair';
    hoverInfo.style.display = 'block';
    hoverInfo.classList.toggle('sat', nearest.kind === 'sat');
    const wrapRect = canvas.parentElement.getBoundingClientRect();
    let left = e.clientX - wrapRect.left + 14;
    let top  = e.clientY - wrapRect.top + 14;
    // Clamp to wrapper
    const infoW = 200, infoH = 120;
    if (left + infoW > wrapRect.width) left = e.clientX - wrapRect.left - infoW - 14;
    if (top + infoH > wrapRect.height) top = e.clientY - wrapRect.top - infoH - 14;
    hoverInfo.style.left = left + 'px';
    hoverInfo.style.top = top + 'px';
    hoverInfo.innerHTML = formatHover(nearest);
  } else {
    state.hoverId = null;
    hoverInfo.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => {
  state.hoverId = null;
  hoverInfo.style.display = 'none';
});
canvas.addEventListener('click', () => {
  if (state.hoverId) {
    state.selectedId = state.selectedId === state.hoverId ? null : state.hoverId;
    renderList();
  }
});
function formatHover(t) {
  const az = Math.round(t.az), el = Math.round(t.el);
  if (t.kind === 'plane') {
    const lines = [`<b>${escapeHtml(t.cs)}</b>`,
      `<div class="row"><span>AZ/EL</span><span>${az}° / ${el}°</span></div>`,
      `<div class="row"><span>ALT</span><span>${Math.round(t.alt_ft).toLocaleString()} ft</span></div>`,
      `<div class="row"><span>SPD</span><span>${Math.round(t.gs)} kt</span></div>`];
    if (t.type) lines.push(`<div class="row"><span>TYPE</span><span>${escapeHtml(t.type)}</span></div>`);
    if (t.reg)  lines.push(`<div class="row"><span>REG</span><span>${escapeHtml(t.reg)}</span></div>`);
    lines.push(`<div class="row"><span>RNG</span><span>${formatRange(t.rangeKm)}</span></div>`);
    return lines.join('');
  } else {
    return [`<b>${escapeHtml(t.cs)}</b>`,
      `<div class="row"><span>AZ/EL</span><span>${az}° / ${el}°</span></div>`,
      `<div class="row"><span>ALT</span><span>${Math.round(t.alt_km).toLocaleString()} km</span></div>`,
      `<div class="row"><span>VEL</span><span>${t.vel_kms.toFixed(2)} km/s</span></div>`,
      `<div class="row"><span>RNG</span><span>${formatRange(t.rangeKm)}</span></div>`].join('');
  }
}

// ===== INPUT HANDLERS =====
async function applyAddress(query) {
  if (!query) return;
  scanBtn.disabled = true;
  setStatus('GEOCODING');
  try {
    const o = await geocode(query);
    setObserver(o);
    localStorage.setItem('skyview.addr', query);
    showToast('LOCK ACQUIRED: ' + (o.name.split(',')[0] || query).toUpperCase().slice(0, 36));
  } catch (err) {
    setStatus('GEO ERR', 'bad');
    showToast(String(err.message || err).toUpperCase());
  } finally {
    scanBtn.disabled = false;
  }
}
scanBtn.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  applyAddress(addrInput.value.trim());
});
addrInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); applyAddress(addrInput.value.trim()); }
});
shareBtn.addEventListener('click', async () => {
  if (!state.observer) { showToast('NO LOCK TO SHARE'); return; }
  const u = new URL(location.href);
  u.search = '';
  u.searchParams.set('lat', state.observer.lat.toFixed(4));
  u.searchParams.set('lon', state.observer.lon.toFixed(4));
  const link = u.toString();
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(link);
      showToast('LINK COPIED TO CLIPBOARD');
    } else {
      prompt('COPY LINK:', link);
    }
  } catch {
    prompt('COPY LINK:', link);
  }
});
geoBtn.addEventListener('click', () => {
  if (!navigator.geolocation) { showToast('NO GEOLOCATION SUPPORT'); return; }
  setStatus('LOCATING');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      addrInput.value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      setObserver({ lat, lon, name: 'DEVICE' });
      localStorage.setItem('skyview.addr', addrInput.value);
      showToast('DEVICE LOCK ACQUIRED');
    },
    () => { setStatus('GEO ERR', 'bad'); showToast('LOCATION DENIED'); },
    { timeout: 8000 }
  );
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { state.selectedId = null; renderList(); }
});

function setObserver(o) {
  state.observer = o;
  obsCoord.textContent = `${Math.abs(o.lat).toFixed(3)}°${o.lat>=0?'N':'S'} ${Math.abs(o.lon).toFixed(3)}°${o.lon>=0?'E':'W'}`;
  emptyMsg.style.display = 'none';
  shareBtn.disabled = false;
  setStatus('SCANNING');
  state.trails.clear();
  if (addrInput && typeof addrInput.blur === 'function') addrInput.blur();
  requestAnimationFrame(() => { resizeCanvas(); });
  fetchPlanes().then(() => { computeSatellites(); renderList(); });
}

// ===== TICKERS =====
function tickClock() {
  const d = new Date();
  utcClock.textContent = d.toISOString().slice(11, 19);
  if (state.observer && state.lastPlaneFetch) {
    const elapsed = (Date.now() - state.lastPlaneFetch) / 1000;
    const remain = Math.max(0, Math.ceil(PLANE_REFRESH_MS / 1000 - elapsed));
    nextRefresh.textContent = remain.toString().padStart(2, '0');
  } else {
    nextRefresh.textContent = '—';
  }
}
function tickPlanes() {
  if (!state.observer) return;
  if (Date.now() - state.lastPlaneFetch >= PLANE_REFRESH_MS) {
    fetchPlanes().then(() => renderList());
  }
}
function tickSats() {
  computeSatellites();
  renderList();
}
function tickTle() {
  if (Date.now() - state.lastTleFetch >= TLE_REFRESH_MS) {
    fetchTLEs();
  }
}

function rafLoop(t) {
  try { drawRadar(t); }
  catch (e) { showErr('drawRadar', e); }
  requestAnimationFrame(rafLoop);
}

// ===== BOOT =====
async function bootSequence() {
  resizeCanvas();
  emptyMsg.style.display = 'grid';
  const baseLines = [
    'SKYVIEW SECTOR TRACKING SYSTEM v1.0',
    '(c) GHIDTM44 INDUSTRIES',
    '',
    'BIOS         v3.7 ........... OK',
    'PHOSPHOR DRV ................ OK',
    'SPG-4 PROPAGATOR ............ OK',
    'AIRSPACE FEED ............... OK',
  ];
  let acc = baseLines.slice(0, 1).join('\n');
  bootLines.textContent = acc;
  await new Promise(r => setTimeout(r, 240));
  for (let i = 1; i < baseLines.length; i++) {
    acc += '\n' + baseLines[i];
    bootLines.textContent = acc;
    await new Promise(r => setTimeout(r, 90));
  }
  bootLines.textContent = acc + '\nLOADING ORBITAL CATALOG...';
  const count = await fetchTLEs();
  bootLines.textContent = acc + `\nLOADING ORBITAL CATALOG ... ${count} OBJECTS`;
  await new Promise(r => setTimeout(r, 420));
  bootLines.innerHTML = bootLines.textContent + '\n\n<span class="cursor">SYSTEM READY</span>';
  await new Promise(r => setTimeout(r, 600));
  boot.classList.add('hidden');
  setTimeout(() => boot.remove(), 600);

  requestAnimationFrame(rafLoop);
  setInterval(tickClock, 1000);
  setInterval(tickPlanes, 1000);
  setInterval(tickSats, 1000);
  setInterval(tickTle, 60_000);

  const urlLat = parseFloat(params.get('lat'));
  const urlLon = parseFloat(params.get('lon'));
  const urlAddr = params.get('addr');
  const saved = localStorage.getItem('skyview.addr');

  if (Number.isFinite(urlLat) && Number.isFinite(urlLon)
      && urlLat >= -90 && urlLat <= 90 && urlLon >= -180 && urlLon <= 180) {
    const q = `${urlLat.toFixed(4)}, ${urlLon.toFixed(4)}`;
    addrInput.value = q;
    setTimeout(() => applyAddress(q), 200);
  } else if (urlAddr) {
    addrInput.value = urlAddr;
    setTimeout(() => applyAddress(urlAddr), 200);
  } else if (saved && !params.has('noauto')) {
    addrInput.value = saved;
    setTimeout(() => applyAddress(saved), 200);
  } else {
    setStatus('AWAITING OBSERVER');
    addrInput.focus();
  }
}
bootSequence();
</script>
</body>
</html>
